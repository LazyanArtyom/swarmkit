syntax = "proto3";

package swarmkit.v1;

/**
 * A single per-vehicle agent running on the edge (e.g. Raspberry Pi).
 * - Accepts commands subject to priority-based authority arbitration.
 * - Publishes telemetry.
 */
service AgentService {
    rpc Ping(PingRequest) returns (PingReply);

    /// Send one flight command to the agent.
    /// The agent routes the command through the CommandArbiter before
    /// forwarding it to the configured backend.
    rpc SendCommand(CommandRequest) returns (CommandReply);

    /// Subscribe to a server-streaming telemetry feed.
    rpc StreamTelemetry(TelemetryRequest) returns (stream TelemetryFrame);

    /// Subscribe to command-authority change events for a drone.
    /// The stream delivers AuthorityEvent messages whenever a client acquires,
    /// preempts, or releases command authority.  Use this to implement
    /// pause/resume logic in clients with periodic command loops.
    rpc WatchAuthority(WatchAuthorityRequest) returns (stream AuthorityEvent);

    /// Acquire exclusive command authority for a drone.
    /// A lower-priority client is rejected immediately.
    /// ttl_ms=0 means no expiry — caller MUST call ReleaseAuthority() when done.
    rpc LockAuthority(LockAuthorityRequest) returns (LockAuthorityReply);

    /// Explicitly release command authority held by this client.
    /// No-op if the client does not currently hold authority.
    rpc ReleaseAuthority(ReleaseAuthorityRequest) returns (ReleaseAuthorityReply);
}

// ---------------------------------------------------------------------------
// Ping
// ---------------------------------------------------------------------------

message PingRequest {
    string agent_id = 1;
}

message PingReply {
    string agent_id = 1;
    string version = 2;
    int64 unix_time_ms = 3;
}

// ---------------------------------------------------------------------------
// Commands
// ---------------------------------------------------------------------------

/**
 * Standard priority levels for command arbitration.
 * Values mirror swarmkit::agent::CommandPriority in commands.h.
 */
enum CommandPriority {
    PRIORITY_OPERATOR = 0;     // Default: CLI and SDK clients.
    PRIORITY_SUPERVISOR = 10;  // Automated local systems.
    PRIORITY_OVERRIDE = 20;    // Deviation-correction / safety override server.
    PRIORITY_EMERGENCY = 100;  // Bypasses arbitration; always executes.
}

/**
 * Metadata that travels with every command.
 * The agent's CommandArbiter uses client_id and priority to decide
 * whether the command is allowed to execute.
 */
message CommandContext {
    string drone_id = 1;         /// Target drone identifier.
    int32 priority = 2;          /// CommandPriority value (default: PRIORITY_OPERATOR).
    int64 deadline_unix_ms = 3;  /// Execution deadline; 0 = no deadline.
    string correlation_id = 4;   /// Caller-assigned tracing ID.
    string client_id = 5;        /// Originating client identifier (required for arbitration).
}

// --- Flight commands (fundamental vehicle control) ---

message CmdArm {}
message CmdDisarm {}
message CmdLand {}

message CmdTakeoff {
    double alt_m = 1;  /// Target altitude in metres AGL.
}

// --- Navigation commands (point-to-point movement) ---

message CmdSetWaypoint {
    double lat_deg = 1;   /// Target latitude in decimal degrees.
    double lon_deg = 2;   /// Target longitude in decimal degrees.
    double alt_m = 3;     /// Target altitude in metres AGL.
    float speed_mps = 4;  /// Max travel speed in m/s; 0 = backend default.
}

message CmdReturnHome {}
message CmdHoldPosition {}

// --- Swarm commands (multi-agent coordination and choreography) ---

message CmdSetRole {
    string role = 1;  /// Freeform role label (e.g. "leader", "follower-3").
}

message CmdSetFormation {
    string formation_id = 1;  /// Identifier of the formation template.
    int32 slot_index = 2;     /// Zero-based position within the formation.
}

/**
 * Execute a pre-defined choreography sequence.
 * sync_unix_ms is the absolute UNIX timestamp (ms) at which all agents
 * start simultaneously, enabling synchronised swarm animations.
 * Set to 0 to start immediately.
 */
message CmdRunSequence {
    string sequence_id = 1;
    int64 sync_unix_ms = 2;
}

/**
 * Top-level discriminated union mirroring the C++ Command variant.
 * Grouped by category (flight / nav / swarm) to keep the oneof extensible.
 */
message Command {
    reserved 30;
    reserved "send_data";

    oneof kind {
        // Flight
        CmdArm arm = 1;
        CmdDisarm disarm = 2;
        CmdTakeoff takeoff = 3;
        CmdLand land = 4;

        // Navigation
        CmdSetWaypoint set_waypoint = 10;
        CmdReturnHome return_home = 11;
        CmdHoldPosition hold_position = 12;

        // Swarm
        CmdSetRole set_role = 20;
        CmdSetFormation set_formation = 21;
        CmdRunSequence run_sequence = 22;
    }
}

message CommandRequest {
    CommandContext ctx = 1;
    Command cmd = 2;
}

message CommandReply {
    enum Status {
        STATUS_UNSPECIFIED = 0;
        OK = 1;
        REJECTED = 2;
        FAILED = 3;
    }
    Status status = 1;
    string message = 2;
}

// ---------------------------------------------------------------------------
// Authority arbitration
// ---------------------------------------------------------------------------

/**
 * Request to subscribe to authority change events for a drone.
 * Register before starting a command loop so that preemption events
 * are not missed.
 */
message WatchAuthorityRequest {
    string drone_id = 1;   /// Drone to watch.
    string client_id = 2;  /// Registrant's client identifier.
    int32 priority = 3;    /// Registrant's authority priority level.
}

/**
 * Delivered to watchers when authority over a drone changes.
 * Events are targeted to the watching client they affect.
 *
 * On PREEMPTED: stop sending commands until RESUMED arrives.
 * On RESUMED:   resume the command loop.
 * On EXPIRED:   your TTL elapsed; re-acquire by sending a new command.
 */
message AuthorityEvent {
    enum Kind {
        KIND_UNSPECIFIED = 0;
        GRANTED = 1;    /// This client was granted command authority.
        PREEMPTED = 2;  /// Authority taken by a higher-priority client.
        RESUMED = 3;    /// Higher-priority client released; authority restored.
        EXPIRED = 4;    /// Authority TTL elapsed; must re-acquire.
    }
    Kind kind = 1;
    string drone_id = 2;
    string holder_client_id = 3;  /// Who now holds authority.
    int32 holder_priority = 4;
}

/**
 * Request to acquire exclusive command authority for a drone.
 * Use priority equal to or higher than the current holder's to preempt.
 * ttl_ms = 0  →  no automatic expiry; caller must call ReleaseAuthority.
 * ttl_ms > 0  →  authority expires after ttl_ms milliseconds.
 */
message LockAuthorityRequest {
    CommandContext ctx = 1;  // drone_id, client_id, priority required.
    int64 ttl_ms = 2;        // 0 = no expiry.
}

message LockAuthorityReply {
    bool ok = 1;
    string message = 2;
}

message ReleaseAuthorityRequest {
    string drone_id = 1;
    string client_id = 2;
}

message ReleaseAuthorityReply {}

// ---------------------------------------------------------------------------
// Telemetry
// ---------------------------------------------------------------------------

message TelemetryRequest {
    string drone_id = 1;
    int32 rate_hz = 2;  /// 0 => server default.
}

message TelemetryFrame {
    string drone_id = 1;
    int64 unix_time_ms = 2;
    double lat_deg = 3;
    double lon_deg = 4;
    float rel_alt_m = 5;
    float battery_percent = 6;
    string mode = 7;
}
